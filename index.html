<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Smart Relay + Temperature Dashboard | Firebase</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf3 100%);
      min-height: 100vh;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* main container */
    .app-wrapper {
      max-width: 1300px;
      width: 100%;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      background: linear-gradient(135deg, #1a2a4f, #0f2b3d);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .sub {
      text-align: center;
      color: #2c3e66;
      margin-bottom: 30px;
      font-weight: 500;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    /* Login card */
    .login-card {
      background: white;
      max-width: 420px;
      margin: 60px auto;
      padding: 32px 28px;
      border-radius: 36px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      transition: 0.2s;
    }
    .login-card h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      color: #0b2b44;
      text-align: center;
    }
    .input-group {
      margin-bottom: 22px;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #1e4663;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 1.5px solid #cfdfed;
      border-radius: 28px;
      background: #fefefe;
      transition: all 0.2s;
      outline: none;
    }
    .input-group input:focus {
      border-color: #2c7da0;
      box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
    }
    #loginBtn {
      width: 100%;
      background: #1f6392;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 12px;
    }
    #loginBtn:hover {
      background: #0e4a6e;
      transform: scale(0.98);
    }

    /* Dashboard panel */
    #dashboard {
      display: none;
    }

    /* metrics row: temp + humidity / percentage */
    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      margin-bottom: 40px;
    }
    .metric-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      border-radius: 38px;
      padding: 22px 28px;
      min-width: 210px;
      text-align: center;
      box-shadow: 0 12px 26px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.6);
      transition: transform 0.2s;
    }
    .metric-card:hover {
      transform: translateY(-5px);
    }
    .metric-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1b4f72;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .big-value {
      font-size: 3.1rem;
      font-weight: 800;
      color: #0a2f44;
      line-height: 1.2;
    }
    .unit {
      font-size: 1.2rem;
      font-weight: 500;
      color: #3a6b8c;
    }
    .progress-bg {
      background: #e0e9f0;
      border-radius: 40px;
      height: 12px;
      width: 100%;
      margin-top: 18px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #f39c12, #e67e22);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.3s ease;
    }
    .sub-meta {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #2c6e9e;
      font-weight: 500;
    }

    /* relays grid */
    .relays-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin: 20px 0 30px;
    }
    .relay-card {
      background: white;
      border-radius: 32px;
      width: 230px;
      padding: 20px 15px 22px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.08);
      transition: all 0.2s ease;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .relay-card h3 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #1b3b4f;
    }
    .relay-status {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 12px 0;
      padding: 6px 12px;
      border-radius: 60px;
      display: inline-block;
      background: #f0f2f5;
    }
    .status-on {
      color: #1f8a4c;
      background: #e0f2e9;
    }
    .status-off {
      color: #b91c1c;
      background: #ffe6e6;
    }
    .toggle-btn {
      background: #2c7da0;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      color: white;
      width: 85%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .toggle-btn:hover {
      opacity: 0.85;
      transform: scale(0.97);
    }
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0 25px;
    }
    .primary-action {
      background: #c44536;
      border: none;
      padding: 14px 34px;
      font-size: 1.05rem;
      font-weight: bold;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 160px;
    }
    .primary-action:hover {
      background: #9b2f21;
      transform: scale(0.97);
    }
    .logout-action {
      background: #4a627a;
    }
    .logout-action:hover {
      background: #2c445c;
    }
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: #4b6a86;
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 20px;
      width: 100%;
    }
    @media (max-width: 700px) {
      .relay-card { width: 90%; }
      .metric-card { width: 90%; }
      .big-value { font-size: 2.4rem; }
      h1 { font-size: 1.6rem; }
    }
    .loader-text {
      color: #2c6e9e;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <h1>⚡ Relay Station · 🌡️ Temp Monitor</h1>
  <div class="sub">Firebase Realtime | Dual Dashboard</div>

  <!-- Login Section -->
  <div id="loginForm" class="login-card">
    <h2>🔐 Access Panel</h2>
    <div class="input-group">
      <label>📧 Email</label>
      <input type="email" id="email" placeholder="device@example.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>🔑 Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="loginBtn">Login to Dashboard →</button>
  </div>

  <!-- MAIN DASHBOARD (after auth) -->
  <div id="dashboard">
    <!-- Climate & Temp block -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-title">🌡️ CURRENT TEMP</div>
        <div class="big-value"><span id="tempValue">--</span><span class="unit"> °C</span></div>
        <div class="progress-bg">
          <div class="progress-fill" id="tempFillBar"></div>
        </div>
        <div class="sub-meta">🔥 Thermal load: <span id="tempPercent">--</span>%</div>
      </div>
      <!-- extra optional metric: analog from temperature conversion -->
      <div class="metric-card">
        <div class="metric-title">📊 HEAT INDEX</div>
        <div class="big-value"><span id="heatStatus">—</span></div>
        <div class="sub-meta">based on real-time temp</div>
      </div>
    </div>

    <!-- 4 Relays Grid -->
    <div class="relays-grid" id="relaysContainer">
      <!-- dynamic binding but static ids used for simplicity, but JS will populate -->
      <div class="relay-card">
        <h3>⚙️ RELAY 1</h3>
        <div><span class="relay-status" id="status1">—</span></div>
        <button class="toggle-btn" id="btn1">Toggle</button>
      </div>
      <div class="relay-card">
        <h3>⚙️ RELAY 2</h3>
        <div><span class="relay-status" id="status2">—</span></div>
        <button class="toggle-btn" id="btn2">Toggle</button>
      </div>
      <div class="relay-card">
        <h3>⚙️ RELAY 3</h3>
        <div><span class="relay-status" id="status3">—</span></div>
        <button class="toggle-btn" id="btn3">Toggle</button>
      </div>
      <div class="relay-card">
        <h3>⚙️ RELAY 4</h3>
        <div><span class="relay-status" id="status4">—</span></div>
        <button class="toggle-btn" id="btn4">Toggle</button>
      </div>
    </div>

    <div class="action-buttons">
      <button id="allOffBtn" class="primary-action">🔻 ALL OFF</button>
      <button id="logoutBtn" class="primary-action logout-action">🚪 Logout</button>
    </div>
  </div>
  <footer>⚡ Secure Firebase sync | Real-time relay & temperature monitoring</footer>
</div>

<!-- Firebase v9 compat libs -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
  // ======================= COMBINED CONFIGURATION =======================
  // The config merges both projects? Actually both projects differ slightly, 
  // but for combined functionality we need a single Firebase project that stores:
  // - temperature node
  // - relay1, relay2, relay3, relay4 nodes
  // Based on the first given snippet, the database has "/temperature" and "/relay1".."/relay4"
  // The second snippet uses "/relay1"... but temperature is missing.
  // We'll use the first project's database (nodemcu-reay-01) because it has temperature+relays structure.
  // However to fully satisfy both features, I will keep the FIRST project's config (temperature + relays) as it contains both.
  // The second project config is only relay focused. So I'm merging the best: using project that contains both nodes.
  // But for stability, let's use first project's credentials because it has "/temperature" path.
  // To avoid errors, we define firebaseConfig from the first provided dashboard (temperature enabled).
  
  const firebaseConfig = {
    apiKey: "AIzaSyAxURUOtjWV02wOteOBQTOLcA4_hxO38Sg",
    authDomain: "nodemcu-reay-01.firebaseapp.com",
    databaseURL: "https://nodemcu-reay-01-default-rtdb.firebaseio.com",
    projectId: "nodemcu-reay-01",
    storageBucket: "nodemcu-reay-01.firebasestorage.app",
    messagingSenderId: "379212172665",
    appId: "1:379212172665:web:18cc956111529f32b233a8"
  };
  
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  
  // DOM elements
  const loginDiv = document.getElementById("loginForm");
  const dashboardDiv = document.getElementById("dashboard");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtnElem = document.getElementById("logoutBtn");
  const allOffBtn = document.getElementById("allOffBtn");
  
  // temperature elements
  const tempSpan = document.getElementById("tempValue");
  const percentSpan = document.getElementById("tempPercent");
  const fillBar = document.getElementById("tempFillBar");
  const heatStatusSpan = document.getElementById("heatStatus");
  
  // relays references (for dynamic state)
  let activeDb = null;
  let relayRefs = [];
  let relayListeners = [];   // store onValue callbacks for cleanup if needed
  
  // Helper: update heat status description
  function updateHeatDescription(tempC) {
    if (tempC === "--" || isNaN(tempC)) {
      heatStatusSpan.innerText = "—";
      return;
    }
    let temp = parseFloat(tempC);
    if (temp < 18) heatStatusSpan.innerText = "❄️ Cool";
    else if (temp < 25) heatStatusSpan.innerText = "😊 Comfortable";
    else if (temp < 32) heatStatusSpan.innerText = "🌤️ Warm";
    else heatStatusSpan.innerText = "🔥 High Alert";
  }
  
  // temperature conversion to percentage (maxTemp = 50°C as per first snippet, but adjustable)
  function updateTemperatureDisplay(tempVal) {
    let numericTemp = parseFloat(tempVal);
    if (isNaN(numericTemp)) {
      tempSpan.innerText = "--";
      percentSpan.innerText = "--";
      fillBar.style.width = "0%";
      updateHeatDescription("--");
      return;
    }
    tempSpan.innerText = numericTemp.toFixed(1);
    let maxTemp = 50;     // reference max 50°C -> 100%
    let percent = (numericTemp / maxTemp) * 100;
    percent = Math.min(100, Math.max(0, percent));
    percentSpan.innerText = percent.toFixed(1);
    fillBar.style.width = percent + "%";
    updateHeatDescription(numericTemp);
  }
  
  // attach temperature listener
  function attachTemperatureListener(db) {
    const tempRef = db.ref("/temperature");
    tempRef.on("value", (snapshot) => {
      let val = snapshot.val();
      // handle both number or string from sensor
      let tempValue = (val !== null && val !== undefined) ? parseFloat(val) : "--";
      if (isNaN(tempValue)) tempValue = "--";
      updateTemperatureDisplay(tempValue);
    });
  }
  
  // attach all relays listeners & toggle logic
  function attachRelays(db) {
    // clear previous listeners if any (prevent duplication)
    for (let i = 1; i <= 4; i++) {
      const existingRef = relayRefs[i];
      if (existingRef && relayListeners[i]) {
        existingRef.off("value", relayListeners[i]);
      }
    }
    relayRefs = [];
    relayListeners = [];
    
    for (let i = 1; i <= 4; i++) {
      const relayPath = `/relay${i}`;
      const relayRef = db.ref(relayPath);
      relayRefs[i] = relayRef;
      
      const statusSpan = document.getElementById(`status${i}`);
      const toggleButton = document.getElementById(`btn${i}`);
      
      if (!statusSpan || !toggleButton) continue;
      
      // define listener callback to keep track
      const handler = (snapshot) => {
        let state = snapshot.val();
        if (state === true || state === "true" || state === 1) {
          statusSpan.innerText = "🔛 ON";
          statusSpan.className = "relay-status status-on";
          toggleButton.style.backgroundColor = "#2b7a4b";
        } else {
          statusSpan.innerText = "⭕ OFF";
          statusSpan.className = "relay-status status-off";
          toggleButton.style.backgroundColor = "#2c7da0";
        }
      };
      relayListeners[i] = handler;
      relayRef.on("value", handler);
      
      // toggle action
      toggleButton.onclick = async () => {
        try {
          const snap = await relayRef.get();
          let current = snap.val();
          let newState = (current === true || current === "true" || current === 1) ? false : true;
          await relayRef.set(newState);
        } catch (err) {
          console.warn("Toggle error:", err);
          alert("Failed to toggle relay, check connection.");
        }
      };
    }
  }
  
  // All OFF function: set all relays to false
  function setupAllOff(db) {
    if (allOffBtn) {
      // remove previous listeners to avoid duplicate handlers
      const newAllOff = () => {
        for (let i = 1; i <= 4; i++) {
          db.ref(`/relay${i}`).set(false).catch(e => console.warn(e));
        }
      };
      // replace any existing onclick
      allOffBtn.onclick = newAllOff;
    }
  }
  
  // reset dashboard UI before starting (clean states)
  function resetDashboardUI() {
    for (let i = 1; i <= 4; i++) {
      const statusSpan = document.getElementById(`status${i}`);
      if (statusSpan) {
        statusSpan.innerText = "⌛ Loading";
        statusSpan.className = "relay-status";
      }
      const toggleBtn = document.getElementById(`btn${i}`);
      if (toggleBtn) toggleBtn.style.backgroundColor = "#2c7da0";
    }
    tempSpan.innerText = "--";
    percentSpan.innerText = "--";
    fillBar.style.width = "0%";
    heatStatusSpan.innerText = "—";
  }
  
  // main startup after authentication
  function startFullSystem() {
    const db = firebase.database();
    activeDb = db;
    resetDashboardUI();
    
    // Attach temperature monitoring
    attachTemperatureListener(db);
    // Attach relays control and listeners
    attachRelays(db);
    // setup all-off
    setupAllOff(db);
  }
  
  // Logout function
  function logoutUser() {
    firebase.auth().signOut().then(() => {
      // hide dashboard, show login
      dashboardDiv.style.display = "none";
      loginDiv.style.display = "block";
      // clear input fields for better UX
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      // detach listeners to avoid memory/ref issues (optional)
      if (activeDb) {
        // detach temp listener if any
        const tempRef = activeDb.ref("/temperature");
        tempRef.off("value");
        // detach each relay listener
        for (let i = 1; i <= 4; i++) {
          if (relayRefs[i] && relayListeners[i]) {
            relayRefs[i].off("value", relayListeners[i]);
          }
        }
      }
    }).catch(err => {
      alert("Logout error: " + err.message);
    });
  }
  
  // login handler
  loginBtn.onclick = () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) {
      alert("Please provide both email and password.");
      return;
    }
    firebase.auth().signInWithEmailAndPassword(email, password)
      .then((userCred) => {
        console.log("Authenticated:", userCred.user.email);
        loginDiv.style.display = "none";
        dashboardDiv.style.display = "block";
        startFullSystem();
      })
      .catch((error) => {
        alert("Login failed: " + error.message);
      });
  };
  
  // logout button event
  if (logoutBtnElem) {
    logoutBtnElem.onclick = () => {
      logoutUser();
    };
  }
  
  // Optional: check if user is already signed in (persistent session)
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      // User already logged in, show dashboard directly
      loginDiv.style.display = "none";
      dashboardDiv.style.display = "block";
      startFullSystem();
    } else {
      // No user signed in, ensure login is visible and dashboard hidden
      loginDiv.style.display = "block";
      dashboardDiv.style.display = "none";
      // clear any stale data
      resetDashboardUI();
    }
  });
  
  // tiny preload reset to avoid glitches
  window.addEventListener("load", () => {
    resetDashboardUI();
  });
</script>
</body>
</html>
